<div class="manage-staff-container">
    <div class="header">
        <div class="header-content">
            <button class="back-btn" (click)="goBack()">← Back</button>
            <h1>Manage Staff</h1>
            <button class="add-btn" (click)="openAddModal()">+ Add Staff</button>
        </div>
    </div>

    <div class="staff-list">
        <div class="list-header">
            <span class="count">{{ users.length }} member(s)</span>
        </div>

        <div class="table-container">
            <table class="staff-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let user of users">
                        <td>
                            <div class="user-cell">
                                <div class="avatar">{{ user.name.charAt(0) }}</div>
                                <span>{{ user.name }}</span>
                            </div>
                        </td>
                        <td>{{ user.email }}</td>
                        <td>
                            <span class="role-badge" [class.admin]="user.role === 'admin'">
                                {{ user.role }}
                            </span>
                        </td>
                        <td>
                            <div class="actions">
                                <button class="action-btn edit" (click)="openEditModal(user)">✏️</button>
                                <button class="action-btn delete" (click)="deleteUser(user._id)">🗑️</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div *ngIf="users.length === 0" class="empty-state">
            <p>No staff members found.</p>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" *ngIf="showModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>{{ isEditMode ? 'Edit Staff' : 'Add New Staff' }}</h2>
                <button class="close-btn" (click)="closeModal()">✕</button>
            </div>

            <form (ngSubmit)="onSubmit()" class="staff-form">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" [(ngModel)]="staffForm.name" name="name" placeholder="Enter name" required />
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" [(ngModel)]="staffForm.email" name="email" placeholder="Enter email" required />
                </div>

                <div class="form-group">
                    <label>{{ isEditMode ? 'New Password (leave empty to keep current)' : 'Password *' }}</label>
                    <input type="password" [(ngModel)]="staffForm.password" name="password"
                        placeholder="Enter password" />
                </div>

                <div class="form-group">
                    <label>Role</label>
                    <select [(ngModel)]="staffForm.role" name="role">
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" class="cancel-btn" (click)="closeModal()">Cancel</button>
                    <button type="submit" class="submit-btn">
                        {{ isEditMode ? 'Update' : 'Create' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
