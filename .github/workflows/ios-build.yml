name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build iOS App (Unsigned)
        run: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -sdk iphoneos -configuration Debug build CODE_SIGNING_ALLOWED=NO -derivedDataPath build

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Build/Products -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -vr ShopManager-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-build
          path: ShopManager-Unsigned.ipa
