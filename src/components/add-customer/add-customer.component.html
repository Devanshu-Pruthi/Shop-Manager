<div class="add-customer-container">
  <div class="header">
    <div class="header-content">
      <button class="back-btn" (click)="goBack()">← Back</button>
      <h1>Add New Customer</h1>
      <div class="spacer"></div>
    </div>
  </div>

  <form (ngSubmit)="onSubmit()" class="customer-form">
    <div class="form-section">
      <h2>Customer Information</h2>

      <div class="form-group">
        <label for="name">Full Name *</label>
        <input
          type="text"
          id="name"
          [(ngModel)]="customer.name"
          name="name"
          placeholder="Enter customer name"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phoneNumber">Phone Number *</label>
          <input
            type="tel"
            id="phoneNumber"
            [(ngModel)]="customer.phoneNumber"
            name="phoneNumber"
            placeholder="+91 XXXXX XXXXX"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="customer.email"
            name="email"
            placeholder="email@example.com"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <input
          type="text"
          id="address"
          [(ngModel)]="customer.address"
          name="address"
          placeholder="Street address"
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="city">City *</label>
          <input
            type="text"
            id="city"
            [(ngModel)]="customer.city"
            name="city"
            placeholder="City"
            required
          />
        </div>

        <div class="form-group">
          <label for="state">State</label>
          <input
            type="text"
            id="state"
            [(ngModel)]="customer.state"
            name="state"
            placeholder="State"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="referredBy">Referred By</label>
          <input
            type="text"
            id="referredBy"
            [(ngModel)]="customer.referredBy"
            name="referredBy"
            placeholder="Walk-in, Friend, Ad, etc."
          />
        </div>

        <div class="form-group">
          <label for="paymentMethod">Payment Method *</label>
          <select
            id="paymentMethod"
            [(ngModel)]="customer.paymentMethod"
            name="paymentMethod"
            required
          >
            <option value="Cash">Cash</option>
            <option value="Card">Card</option>
            <option value="UPI">UPI</option>
            <option value="EMI">EMI</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <h2>Phone Details</h2>
        <button type="button" class="add-phone-btn" (click)="addPhone()">+ Add Phone</button>
      </div>

      <div *ngFor="let phone of phones; let i = index" class="phone-entry">
        <div class="phone-header">
          <h3>Phone {{ i + 1 }}</h3>
          <button
            *ngIf="phones.length > 1"
            type="button"
            class="remove-btn"
            (click)="removePhone(i)"
          >
            Remove
          </button>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label [for]="'brand-' + i">Brand *</label>
            <input
              type="text"
              [id]="'brand-' + i"
              [(ngModel)]="phone.brand"
              [name]="'brand-' + i"
              placeholder="Samsung, Apple, etc."
              required
            />
          </div>

          <div class="form-group">
            <label [for]="'model-' + i">Model *</label>
            <input
              type="text"
              [id]="'model-' + i"
              [(ngModel)]="phone.model"
              [name]="'model-' + i"
              placeholder="Galaxy S23, iPhone 15"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label [for]="'imei-' + i">IMEI Number *</label>
          <input
            type="text"
            [id]="'imei-' + i"
            [(ngModel)]="phone.imeiNumber"
            [name]="'imei-' + i"
            placeholder="15 digit IMEI number"
            required
          />
        </div>

        <div class="form-group">
          <label [for]="'price-' + i">Price (₹) *</label>
          <input
            type="number"
            [id]="'price-' + i"
            [(ngModel)]="phone.price"
            [name]="'price-' + i"
            placeholder="0"
            min="0"
            required
          />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-group">
        <label for="notes">Notes</label>
        <textarea
          id="notes"
          [(ngModel)]="customer.notes"
          name="notes"
          rows="3"
          placeholder="Additional notes about the customer..."
        ></textarea>
      </div>
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <button type="submit" class="submit-btn">Save Customer</button>
  </form>
</div>
